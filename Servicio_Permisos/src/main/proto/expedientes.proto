syntax = "proto3";

option java_package = "com.sistema.expedientes.grpc";
option java_multiple_files = true;

package expedientes; 

// El servicio que debe implementar Servicio_Expedientes para recibir los datos
service NotificacionAccesoService {
  // Permisos llama a esto para entregar la cédula y el nivel
  rpc RegistrarAccesoMedico (AccesoMedicoRequest) returns (AccesoMedicoResponse);
}

message AccesoMedicoRequest {
  string cedula_profesional = 1;
  string documento_acceso = 2;
  string nivel_permiso = 3; // Ejemplo: 1=Lectura, 2=Escritura, 3=Admin
}

message AccesoMedicoResponse {
  bool recibido_con_exito = 1;
  string mensaje = 2; 
}
